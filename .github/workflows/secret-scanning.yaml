name: Secret Scanning

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  gitleaks:
    name: Scan for Secrets with Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for complete scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          config-path: .gitleaks.toml

  detect-secrets:
    name: Scan for Secrets with detect-secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install detect-secrets
        run: |
          pip install detect-secrets

      - name: Run detect-secrets scan
        run: |
          detect-secrets scan --all-files \
            --exclude-files '\.git/.*' \
            --exclude-files '\.secrets\.baseline' \
            --exclude-files 'package-lock\.json' \
            --exclude-files '.*\.lock' \
            > .secrets.baseline.new

      - name: Compare with baseline
        run: |
          if [ -f .secrets.baseline ]; then
            detect-secrets audit .secrets.baseline.new
          else
            echo "No baseline found, creating new baseline"
            mv .secrets.baseline.new .secrets.baseline
          fi

  trufflehog:
    name: Scan for Secrets with TruffleHog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  summary:
    name: Secret Scanning Summary
    runs-on: ubuntu-latest
    needs: [gitleaks, detect-secrets, trufflehog]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Secret scanning completed"
          echo "Gitleaks: ${{ needs.gitleaks.result }}"
          echo "detect-secrets: ${{ needs.detect-secrets.result }}"
          echo "TruffleHog: ${{ needs.trufflehog.result }}"

      - name: Fail if secrets detected
        if: needs.gitleaks.result == 'failure' || needs.detect-secrets.result == 'failure' || needs.trufflehog.result == 'failure'
        run: |
          echo "❌ Secrets detected! Please remove them before merging."
          exit 1
